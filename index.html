<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Masjid Jami' Nurul Qolbi</title>
    <style>
        :root { --gold: #FFD700; --emerald: #10893e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 350px; background: rgba(0, 0, 0, 0.8); padding: 30px; border-right: 1px solid #333; }
        .header h1 { font-size: 1.4rem; color: var(--gold); margin: 0; }
        .jadwal-item { padding: 12px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 1.2rem; }
        
        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #timer-display { font-size: 12rem; font-weight: bold; color: var(--gold); margin: 20px 0; }
        #status-text { font-size: 2rem; color: #ccc; }
        
        #marquee { position: absolute; bottom: 0; width: 100%; background: #222; padding: 15px; font-size: 1.5rem; color: var(--gold); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h1>MASJID JAMI' NURUL QOLBI</h1>
        <p>Perum Dian Anyar, Purwakarta</p>
    </div>
    <div id="jadwal-list">Memuat jadwal...</div>
</div>

<div id="main-view">
    <div id="status-text">WAKTU SEKARANG</div>
    <div id="timer-display">00:00:00</div>
    <div id="marquee">
        <marquee scrollamount="5">Selamat Datang di Masjid Jami' Nurul Qolbi. Mari tingkatkan ibadah kita.</marquee>
    </div>
</div>

<script>
    // 1. Fungsi Update Jam Real-time
    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('timer-display').innerText = timeString;
    }

    // 2. Fetch Jadwal Sholat
    async function updateJadwal() {
        try {
            const res = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/2026/06/18');
            const data = await res.json();
            const j = data.data.jadwal;
            document.getElementById('jadwal-list').innerHTML = `
                <div class="jadwal-item"><span>SUBUH</span> <span>${j.subuh}</span></div>
                <div class="jadwal-item"><span>DZUHUR</span> <span>${j.dzuhur}</span></div>
                <div class="jadwal-item"><span>ASHAR</span> <span>${j.ashar}</span></div>
                <div class="jadwal-item"><span>MAGHRIB</span> <span>${j.maghrib}</span></div>
                <div class="jadwal-item"><span>ISYA</span> <span>${j.isya}</span></div>
            `;
        } catch (e) {
            document.getElementById('jadwal-list').innerText = "Gagal memuat jadwal";
        }
    }

    // Jalankan
    updateJadwal();
    setInterval(updateClock, 1000); // Detik bergerak tiap 1 detik
    setInterval(updateJadwal, 3600000); // Update jadwal tiap 1 jam
</script>
</body>
</html>
