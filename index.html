<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; height: 100vh; overflow: hidden; display: grid; grid-template-columns: 250px 1fr; grid-template-rows: 80px 1fr; gap: 10px; padding: 10px; box-sizing: border-box; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

        /* Kiri: Jadwal (Grid) */
        .sidebar { grid-row: 1 / span 2; display: flex; flex-direction: column; gap: 8px; }
        .kotak-jadwal { background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #444; border-radius: 5px; text-align: center; font-weight: bold; }
        .nama-sholat { display: block; font-size: 0.9rem; color: #FFD700; }
        .jam-sholat { font-size: 1.4rem; }

        /* Atas: Header (Jam, Masjid, Tanggal) */
        .top-bar { grid-column: 2; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; align-items: center; }
        .top-box { background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #444; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="LINK_VIDEO_ANDA_DI_SINI.mp4" type="video/mp4">
</video>

<div class="sidebar" id="list-sholat">
    </div>

<div class="top-bar">
    <div class="top-box" id="jam">00:00:00</div>
    <div class="top-box">
        <h1 style="margin:0; font-size: 1.2rem;">MASJID JAMI' NURUL QOLBI</h1>
    </div>
    <div class="top-box" id="tgl">...</div>
</div>

<script>
    async function update() {
        const now = new Date();
        document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('tgl').innerText = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

        const res = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate());
        const data = await res.json();
        const j = data.data.jadwal;
        
        document.getElementById('list-sholat').innerHTML = `
            <div class="kotak-jadwal"><span class="nama-sholat">Imsak</span><span class="jam-sholat">${j.imsak}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Subuh</span><span class="jam-sholat">${j.subuh}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Syuruq</span><span class="jam-sholat">${j.terbit}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Dzuhur</span><span class="jam-sholat">${j.dzuhur}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Ashar</span><span class="jam-sholat">${j.ashar}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Maghrib</span><span class="jam-sholat">${j.maghrib}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Isya</span><span class="jam-sholat">${j.isya}</span></div>
        `;
    }
    setInterval(update, 1000);
    update();
</script>
</body>
</html>
