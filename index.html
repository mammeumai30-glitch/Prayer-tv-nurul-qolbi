<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 120px 1fr; grid-template-areas: "header header" "sidebar content"; overflow: hidden; }
        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        #jam { width: 250px; font-size: 2.5rem; font-weight: bold; font-family: monospace; }
        .masjid-box { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .masjid-box h1 { margin: 0; font-size: 2.6rem; color: #FFD700; font-family: 'Times New Roman', serif; }
        .alamat { font-size: 1.3rem; margin-top: 2px; }
        .tgl-box { width: 250px; text-align: right; font-size: 1.2rem; }
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; color: #fff; }
        .running-text-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #FFD700; color: #000; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; z-index: 9999; }
        #adzan-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 999999; }
        #persiapan-text { font-size: 5rem; color: #CCFF00; font-weight: bold; margin-bottom: 20px; }
        #countdown-text { font-size: 15rem; color: #CCFF00; font-weight: bold; }
    </style>
</head>
<body>
    <button onclick="playAlert()" style="position:fixed; bottom:10px; left:10px; z-index:99999; background:transparent; border:none; color:#FFD700; font-size:1.5rem; cursor:pointer;">🔊</button>
    <div class="header">
        <div id="jam">00:00:00</div>
        <div class="masjid-box"><h1>MASJID JAMI' NURUL QOLBI</h1><div class="alamat">Perumahan Dian Anyar, Purwakarta 41118</div></div>
        <div class="tgl-box"><div id="tgl-masehi">Memuat...</div><div id="tgl-hijriah" style="color: #FFD700;"></div></div>
    </div>
    <div class="sidebar" id="list-sholat"></div>
    <div class="running-text-fixed"><marquee scrollamount="3">Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.</marquee></div>
    <div id="adzan-mode"><div id="persiapan-text"></div><div id="countdown-text"></div></div>

    <script>
        let jadwal = null;
        let playedAdzan = false; let playedIqomah = false;
        const audioBeep = new Audio('https://files.catbox.moe/q59d0u.mp3');
        function playAlert() { audioBeep.play().catch(e => console.log("Menunggu interaksi")); }

        async function update() {
            const now = new Date(); document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            if (jadwal) {
                ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'].forEach((waktu) => {
                    const [h, m] = jadwal[waktu].split(':'); const tAdzan = new Date(); tAdzan.setHours(h, m, 0);
                    const diff = (tAdzan - now) / 1000;
                    renderAdzanMode(diff, waktu);
                });
            }
        }
        function renderAdzanMode(diff, waktu) {
            const adzan = document.getElementById('adzan-mode'), pText = document.getElementById('persiapan-text'), cText = document.getElementById('countdown-text');
            if (diff > 0 && diff <= 60) {
                if (Math.floor(diff) === 3 && !playedAdzan) { playAlert(); playedAdzan = true; }
                adzan.style.display = 'flex'; pText.innerText = "PERSIAPAN ADZAN"; cText.innerText = Math.floor(diff);
            } else if (diff < -240) {
                playedAdzan = false;
                const sisaIqomah = ((waktu === 'subuh') ? 600 : 360) - (Math.abs(diff) - 240);
                if (sisaIqomah > 0 && sisaIqomah <= 360) {
                    if (Math.floor(sisaIqomah) === 3 && !playedIqomah) { playAlert(); playedIqomah = true; }
                    adzan.style.display = 'flex'; pText.innerText = "IQOMAH"; cText.innerText = Math.floor(sisaIqomah/60) + ":" + (sisaIqomah%60).toString().padStart(2,'0');
                } else { adzan.style.display = 'none'; playedIqomah = false; }
            } else { adzan.style.display = 'none'; }
        }
        async function init() {
            const now = new Date(); document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
            const resJ = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
            const dataJ = await resJ.json(); const t = dataJ.data.timings;
            jadwal = { imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha };
            document.getElementById('list-sholat').innerHTML = Object.entries(jadwal).map(([k,v]) => `<div class="kotak-jadwal" id="jadwal-${k}"><span>${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
        }
        init(); setInterval(update, 1000);
    </script>
</body>
</html>
