<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; 
               grid-template-columns: 280px 1fr; grid-template-rows: 120px 1fr 50px; 
               grid-template-areas: "header header" "sidebar content" "footer footer"; overflow: hidden; }

        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; }
        #jam { width: 250px; font-size: 2.5rem; font-weight: bold; font-family: monospace; }
        .masjid-box { flex: 1; text-align: center; }
        .masjid-box h1 { margin: 0; font-size: 2.6rem; color: #FFD700; }
        .alamat { font-size: 1.3rem; color: #fff; margin-top: 5px; }
        .tgl-box { width: 250px; text-align: right; font-size: 1.2rem; }
        
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; color: #FFD700; font-weight: bold; }
        
        /* HIJAU STABILO & FONT HITAM (METODE PAKSA) */
        .kotak-jadwal.aktif { background: #32CD32 !important; color: #000 !important; }
        .kotak-jadwal.aktif span { color: #000 !important; }

        .footer { grid-area: footer; background: #222; color: #FFD700; display: flex; align-items: center; font-size: 1.5rem; padding: 0 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="jam">00:00:00</div>
        <div class="masjid-box">
            <h1>MASJID JAMI' NURUL QOLBI</h1>
            <div class="alamat">Perum Dian Anyar, Purwakarta 41118</div>
        </div>
        <div class="tgl-box">
            <div id="tgl-masehi"></div>
            <div id="tgl-hijriah" style="color: #FFD700;"></div>
        </div>
    </div>
    <div class="sidebar" id="list-sholat"></div>
    <div class="footer">
        <marquee>Selamat Datang di Masjid Jami' Nurul Qolbi - Silakan jaga ketenangan dan kebersihan masjid.</marquee>
    </div>

<script>
    async function update() {
        const now = new Date();
        document.getElementById('jam').innerText = now.toTimeString().split(' ')[0];
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        const resH = await fetch(`https://api.aladhan.com/v1/gToH?date=${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}`);
        const dataH = await resH.json();
        document.getElementById('tgl-hijriah').innerText = `${dataH.data.hijri.date} ${dataH.data.hijri.month.en}`;

        const res = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
        const data = await res.json();
        const t = data.data.timings;
        const jadwal = { imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha };
        
        const list = document.getElementById('list-sholat');
        list.innerHTML = Object.entries(jadwal).map(([k,v]) => `<div class="kotak-jadwal"><span>${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
        
        const keys = Object.keys(jadwal);
        let activeIdx = -1;
        keys.forEach((k, i) => {
            const [h, m] = jadwal[k].split(':');
            const d = new Date(); d.setHours(h, m, 0);
            if (now >= d) activeIdx = i;
        });
        if(activeIdx >= 0) list.children[activeIdx].classList.add('aktif');
    }
    setInterval(update, 1000);
    update();
</script>
</body>
</html>
