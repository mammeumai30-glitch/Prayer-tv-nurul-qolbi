<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* Layout */
        .container { display: flex; justify-content: space-between; padding: 20px; }
        header { text-align: center; }
        h1 { margin: 0; color: #FFD700; font-size: 1.8rem; }
        
        /* Sidebar Jadwal */
        #jadwal-box { background: rgba(0,0,0,0.6); padding: 20px; width: 300px; border-radius: 10px; }
        .j-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #444; font-size: 1.2rem; }

        /* Top Right Info */
        #top-right { text-align: right; }
        
        #timer-display { font-size: 8rem; font-weight: bold; text-align: center; margin: 50px 0; }
        #status-sholat { text-align: center; font-size: 2rem; color: #FFD700; }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="LINK_VIDEO_ANDA_DI_SINI.mp4" type="video/mp4">
</video>

<div class="container">
    <div id="jadwal-box">
        <h1>MASJID JAMI' NURUL QOLBI</h1>
        <p style="text-align:center">Perum Dian Anyar, Purwakarta</p>
        <div id="list-sholat">Memuat jadwal...</div>
    </div>
    
    <div id="top-right">
        <div id="tanggal-masehi" style="font-size: 1.2rem;"></div>
        <div id="tanggal-hijriah" style="font-size: 1.2rem; color: #FFD700;"></div>
    </div>
</div>

<div id="timer-display">00:00:00</div>
<div id="status-sholat">Waktu Sekarang</div>

<script>
    async function updateApp() {
        const now = new Date();
        document.getElementById('timer-display').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        
        // Tanggal Masehi
        document.getElementById('tanggal-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // Tanggal Hijriah (API Sederhana)
        const resHijri = await fetch('https://api.aladhan.com/v1/gToH?date=' + now.getDate() + '-' + (now.getMonth()+1) + '-' + now.getFullYear());
        const dataHijri = await resHijri.json();
        document.getElementById('tanggal-hijriah').innerText = dataHijri.data.hijri.date + " " + dataHijri.data.hijri.month.en;

        // Jadwal Sholat
        const resSholat = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate());
        const dataSholat = await resSholat.json();
        const j = dataSholat.data.jadwal;
        document.getElementById('list-sholat').innerHTML = `
            <div class="j-row"><span>Subuh</span><span>${j.subuh}</span></div>
            <div class="j-row"><span>Dzuhur</span><span>${j.dzuhur}</span></div>
            <div class="j-row"><span>Ashar</span><span>${j.ashar}</span></div>
            <div class="j-row"><span>Maghrib</span><span>${j.maghrib}</span></div>
            <div class="j-row"><span>Isya</span><span>${j.isya}</span></div>
        `;
    }

    setInterval(updateApp, 1000);
    updateApp();
</script>
</body>
</html>
