<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; 
               grid-template-columns: 280px 1fr; 
               grid-template-rows: 120px 1fr; 
               grid-template-areas: "header header" "sidebar content"; overflow: hidden; }

        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        #jam { width: 250px; font-size: 2.5rem; font-weight: bold; font-family: monospace; }
        .masjid-box { flex: 1; text-align: center; }
        .masjid-box h1 { margin: 0; font-size: 2.6rem; color: #FFD700; font-family: 'Times New Roman', serif; }
        .alamat { font-size: 1.3rem; color: #fff; margin-top: 2px; }
        .tgl-box { width: 250px; text-align: right; font-size: 1.2rem; }
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Layout kotak tetap */
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; transition: background 0.3s; }
    </style>
</head>
<body>

<div class="header">
    <div id="jam">00:00:00</div>
    <div class="masjid-box">
        <h1>MASJID JAMI' NURUL QOLBI</h1>
        <div class="alamat">Perum Dian Anyar, Purwakarta</div>
    </div>
    <div class="tgl-box">
        <div id="tgl-masehi">Memuat...</div>
        <div id="tgl-hijriah" style="color: #FFD700; margin-top: 5px;"></div>
    </div>
</div>

<div class="sidebar" id="list-sholat"></div>

<script>
    let jadwal = null;

    function updateJam() {
        const now = new Date();
        document.getElementById('jam').innerText = now.toTimeString().split(' ')[0];
    }

    async function init() {
        const now = new Date();
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        const res = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
        const data = await res.json();
        const t = data.data.timings;
        jadwal = { imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha };
        
        // Buat ID unik per baris
        document.getElementById('list-sholat').innerHTML = Object.entries(jadwal).map(([k,v]) => 
            `<div class="kotak-jadwal" id="row-${k}">
                <span class="nama" style="color: #FFD700; font-weight: bold;">${k.toUpperCase()}</span>
                <span class="waktu" style="color: #FFD700;">${v}</span>
            </div>`).join('');
            
        highlightJadwal();
    }

    function highlightJadwal() {
        if (!jadwal) return;
        const now = new Date();
        const sholatKeys = ['imsak', 'subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
        let lastPassedIndex = -1;
        
        sholatKeys.forEach((key, index) => {
            const [h, m] = jadwal[key].split(':');
            const t = new Date(); t.setHours(h, m, 0);
            if (now >= t) lastPassedIndex = index;
        });

        let activeIndex = (lastPassedIndex >= 6) ? 1 : lastPassedIndex;
        
        sholatKeys.forEach((key, idx) => {
            const el = document.getElementById(`row-${key}`);
            const nama = el.querySelector('.nama');
            const waktu = el.querySelector('.waktu');
            
            if (idx === activeIndex) {
                el.style.backgroundColor = '#32CD32'; // Hijau Stabilo
                nama.style.color = '#000';           // Paksa Hitam
                waktu.style.color = '#000';          // Paksa Hitam
            } else {
                el.style.backgroundColor = '#1a1a1a'; // Default
                nama.style.color = '#FFD700';        // Default Emas
                waktu.style.color = '#FFD700';       // Default Emas
            }
        });
    }

    init();
    setInterval(() => {
        updateJam();
        highlightJadwal();
    }, 1000);
</script>
</body>
</html>
