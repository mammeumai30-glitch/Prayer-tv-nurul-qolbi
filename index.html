<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Masjid Jami' Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; 
               grid-template-columns: 280px 1fr; 
               grid-template-rows: 120px 1fr 50px; 
               grid-template-areas: "header header" "sidebar content" "footer footer"; overflow: hidden; }

        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: none; }
        #jam { width: 250px; font-size: 2.5rem; font-weight: bold; font-family: monospace; }
        .masjid-box { flex: 1; text-align: center; }
        .masjid-box h1 { margin: 0; font-size: 2.6rem; color: #FFD700; font-family: 'Times New Roman', serif; }
        .alamat { font-size: 1.3rem; margin-top: 2px; }
        .tgl-box { width: 250px; text-align: right; font-size: 1.2rem; }
        
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; }
        .nama-sholat { color: #FFD700; font-weight: bold; }

        .running-text-fixed { grid-area: footer; background: #FFD700; color: #000; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; overflow: hidden; }
        #adzan-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div class="header">
    <div id="jam">00:00:00</div>
    <div class="masjid-box">
        <h1>MASJID JAMI' NURUL QOLBI</h1>
        <div class="alamat">Perumahan Dian Anyar, Purwakarta 41118</div>
    </div>
    <div class="tgl-box">
        <div id="tgl-masehi"></div>
        <div id="tgl-hijriah" style="color: #FFD700; margin-top: 5px;"></div>
    </div>
</div>

<div class="sidebar" id="list-sholat"></div>

<div class="running-text-fixed">
    <marquee scrollamount="4">Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.</marquee>
</div>

<script>
    function updateJam() {
        const now = new Date();
        const jamString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        document.getElementById('jam').innerText = jamString.replace(/\./g, ':');
    }

    async function init() {
        const now = new Date();
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        const res = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
        const data = await res.json();
        const t = data.data.timings;
        const h = data.data.date.hijri;
        
        document.getElementById('tgl-hijriah').innerText = `${h.day} ${h.month.en} ${h.year} H`;
        
        const jadwal = { 
            imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, 
            dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha 
        };
        
        document.getElementById('list-sholat').innerHTML = Object.entries(jadwal).map(([k,v]) => 
            `<div class="kotak-jadwal"><span class="nama-sholat">${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
    }

    init();
    setInterval(updateJam, 1000);
</script>
</body>
</html>
