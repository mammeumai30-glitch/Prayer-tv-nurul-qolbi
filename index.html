<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

        /* Sidebar Kiri (Jadwal) */
        #sidebar { width: 300px; height: 100vh; background: rgba(0,0,0,0.7); padding: 20px; box-sizing: border-box; border-right: 2px solid #FFD700; }
        .j-box { background: rgba(255,255,255,0.1); margin-bottom: 10px; padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; border-left: 8px solid #FFD700; }
        
        /* Area Kanan */
        #main-area { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        
        /* Top Bar Kanan */
        #top-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; }
        .masjid-title { font-size: 1.5rem; color: #FFD700; font-weight: bold; }
        
        /* Jam Tengah */
        #jam-utama { font-size: 10rem; font-weight: bold; text-align: center; margin-top: 100px; color: #fff; }
        #status-teks { text-align: center; font-size: 3rem; color: #FFD700; }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="LINK_VIDEO_ANDA_DI_SINI.mp4" type="video/mp4">
</video>

<div id="sidebar">
    <div id="list-sholat">Memuat jadwal...</div>
</div>

<div id="main-area">
    <div id="top-bar">
        <div class="masjid-title">MASJID JAMI' NURUL QOLBI - Perum Dian Anyar, Purwakarta</div>
        <div style="text-align: right;">
            <div id="tgl-masehi" style="font-size: 1.1rem;"></div>
            <div id="tgl-hijriah" style="color: #FFD700; font-size: 1.1rem;"></div>
        </div>
    </div>

    <div id="status-teks">WAKTU SEKARANG</div>
    <div id="jam-utama">00:00:00</div>
</div>

<script>
    async function updateApp() {
        const now = new Date();
        document.getElementById('jam-utama').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const resHijri = await fetch('https://api.aladhan.com/v1/gToH?date=' + now.getDate() + '-' + (now.getMonth()+1) + '-' + now.getFullYear());
        const dataHijri = await resHijri.json();
        document.getElementById('tgl-hijriah').innerText = dataHijri.data.hijri.date + " " + dataHijri.data.hijri.month.en;

        const resSholat = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate());
        const dataSholat = await resSholat.json();
        const j = dataSholat.data.jadwal;
        
        document.getElementById('list-sholat').innerHTML = `
            <div class="j-box"><span>Subuh</span><span>${j.subuh}</span></div>
            <div class="j-box"><span>Syuruq</span><span>${j.terbit}</span></div>
            <div class="j-box"><span>Dzuhur</span><span>${j.dzuhur}</span></div>
            <div class="j-box"><span>Ashar</span><span>${j.ashar}</span></div>
            <div class="j-box"><span>Maghrib</span><span>${j.maghrib}</span></div>
            <div class="j-box"><span>Isya</span><span>${j.isya}</span></div>
        `;
    }
    setInterval(updateApp, 1000);
    updateApp();
</script>
</body>
</html>
