<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; 
               grid-template-columns: 280px 1fr; 
               grid-template-rows: 120px 1fr; 
               grid-template-areas: "header header" "sidebar content";
               overflow: hidden; }

        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: none; }
        #jam { width: 250px; font-size: 2.5rem; font-weight: bold; text-align: left; font-family: monospace; }
        .masjid-box { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .masjid-box h1 { margin: 0; font-size: 2.6rem; color: #FFD700; white-space: nowrap; font-family: 'Times New Roman', serif; }
        .alamat { font-size: 1.3rem; color: #fff; margin-top: 2px; }
        .tgl-box { width: 250px; text-align: right; font-size: 1.2rem; }
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; }
        .nama-sholat { color: #FFD700; font-weight: bold; }
        .running-text-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #FFD700; color: #000; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; z-index: 9999; }
        
        /* MODE PUSAT (ADZAN, IQOMAH, SHOLAT) */
        #adzan-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
        #persiapan-text { font-family: 'Times New Roman', serif; font-size: 5rem; color: #FFD700; margin-bottom: 20px; }
        #countdown-text { font-size: 15rem; color: #FFD700; font-weight: bold; line-height: 1; }
        
        #progress-wrapper { position: absolute; bottom: 15%; width: 80%; }
        #progress-container { width: 100%; height: 25px; background: #333; border-radius: 12px; overflow: hidden; }
        #progress-bar { height: 100%; background: #FFD700; width: 0%; transition: width 1s linear; }
        
        #iqomah-text { font-family: 'Times New Roman', serif; font-size: 5rem; color: #fff; margin-bottom: 20px; }
        #iqomah-timer { font-family: monospace; font-size: 15rem; color: #FFD700; font-weight: bold; line-height: 1; }
        #sholat-text { font-family: 'Times New Roman', serif; font-size: 4rem; color: #fff; margin-bottom: 20px; }
        #jam-sholat { font-family: monospace; font-size: 15rem; color: #FFD700; font-weight: bold; line-height: 1; }
    </style>
</head>
<body>

<div class="header">
    <div id="jam">00:00:00</div>
    <div class="masjid-box">
        <h1>MASJID JAMI' NURUL QOLBI</h1>
        <div class="alamat">Perumahan Dian Anyar, Purwakarta 41118</div>
    </div>
    <div class="tgl-box">
        <div id="tgl-masehi">Memuat...</div>
        <div id="tgl-hijriah" style="color: #FFD700; margin-top: 5px;"></div>
    </div>
</div>

<div class="sidebar" id="list-sholat"></div>

<div class="running-text-fixed">
    <marquee scrollamount="3">Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.</marquee>
</div>

<div id="adzan-mode">
    <div id="persiapan-text"></div>
    <div id="countdown-text"></div>
    <div id="progress-wrapper" style="display:none;"><div id="progress-container"><div id="progress-bar"></div></div></div>
</div>

<script>
    let jadwal = null;
    const IS_TESTING = false;

    async function update() {
        const now = new Date();
        // Perbaikan Jam: format HH:mm:ss dengan titik dua
        document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        
        if (jadwal) {
            const sholatList = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            sholatList.forEach(waktu => {
                const [h, m] = jadwal[waktu].split(':');
                const tAdzan = new Date(); tAdzan.setHours(h, m, 0);
                const diff = (tAdzan - now) / 1000;
                renderAdzanMode(diff, waktu);
            });
        }
    }

    function renderAdzanMode(diff, waktu) {
        const adzan = document.getElementById('adzan-mode');
        const pText = document.getElementById('persiapan-text');
        const cText = document.getElementById('countdown-text');
        const pWrap = document.getElementById('progress-wrapper');

        if (diff > 0 && diff <= 60) {
            adzan.style.display = 'flex';
            pText.innerText = "Persiapan Adzan";
            cText.innerText = Math.floor(diff);
            pWrap.style.display = 'none';
        } else if (diff <= 0 && diff >= -240) {
            adzan.style.display = 'flex';
            pText.innerText = "Saat Adzan Harap Tenang";
            cText.innerText = ""; 
            pWrap.style.display = 'block';
            document.getElementById('progress-bar').style.width = ((Math.abs(diff) / 240) * 100) + "%";
        } else if (diff < -240) {
            const durasiIqomah = (waktu === 'subuh') ? 600 : 360; 
            const sisaIqomah = durasiIqomah - (Math.abs(diff) - 240);
            if (sisaIqomah > 0) {
                adzan.style.display = 'flex';
                pText.innerHTML = '<div id="iqomah-text">Iqomah</div><div id="iqomah-timer">' + Math.floor(sisaIqomah/60).toString().padStart(2,'0') + ':' + (sisaIqomah%60).toString().padStart(2,'0') + '</div>';
                cText.innerText = "";
                pWrap.style.display = 'none';
            } else if (sisaIqomah <= 0 && sisaIqomah > -600) {
                adzan.style.display = 'flex';
                pText.innerHTML = '<div id="sholat-text">Waktu Sholat</div><div id="jam-sholat">' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + '</div>';
            } else {
                adzan.style.display = 'none';
            }
        }
    }

    async function init() {
        const now = new Date();
        // Menampilkan Tanggal Masehi & Hijriah
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        const resJ = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
        const dataJ = await resJ.json();
        const t = dataJ.data.timings;
        const h = dataJ.data.date.hijri;
        document.getElementById('tgl-hijriah').innerText = `${h.day} ${h.month.en} ${h.year} H`;
        
        // Memasukkan Imsak dan Terbit ke dalam daftar jadwal
        jadwal = { imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha };
        document.getElementById('list-sholat').innerHTML = Object.entries(jadwal).map(([k,v]) => `<div class="kotak-jadwal"><span class="nama-sholat">${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
    }
    init(); setInterval(update, 1000);
</script>
</body>
</html>
