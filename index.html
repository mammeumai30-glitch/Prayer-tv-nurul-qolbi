<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 120px 1fr;
            grid-template-areas: "header header" "sidebar content";
            overflow: hidden;
        }

        .header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        #jam {
            width: 250px;
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
        }

        .masjid-box {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .masjid-box h1 {
            margin: 0;
            font-size: 2.6rem;
            color: #FFD700;
            font-family: 'Times New Roman', serif;
        }

        .alamat {
            font-size: 1.3rem;
            margin-top: 2px;
        }

        .tgl-box {
            width: 250px;
            text-align: right;
            font-size: 1.2rem;
        }

        .sidebar {
            grid-area: sidebar;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .kotak-jadwal {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
        }

        .nama-sholat {
            color: #FFD700;
            font-weight: bold;
        }

        .aktif {
            background: #CCFF00 !important;
        }

        .aktif .nama-sholat,
        .aktif .waktu-sholat {
            color: #000 !important;
            font-weight: bold;
        }

        .running-text-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #FFD700;
            color: #000;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            z-index: 9999;
        }

        #adzan-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }

        #persiapan-text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 5rem;
            color: #CCFF00;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        #countdown-text {
            font-family: 'Arial Narrow', sans-serif;
            font-size: 15rem;
            color: #CCFF00;
            font-weight: bold;
            line-height: 1;
        }

        #progress-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
            z-index: 1000;
        }

        #progress-container {
            width: 500px;
            height: 60px;
            background: #333;
            border: 4px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            transition: width 1s linear, background-color 0.5s ease;
            position: absolute;
            left: 0;
            top: 0;
        }

        #battery-head {
            width: 20px;
            height: 30px;
            background: #fff;
            border-radius: 0 6px 6px 0;
            margin-left: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="jam">00:00:00</div>
        <div class="masjid-box">
            <h1>MASJID JAMI' NURUL QOLBI</h1>
            <div class="alamat">Perumahan Dian Anyar, Purwakarta 41118</div>
        </div>
        <div class="tgl-box">
            <div id="tgl-masehi">Memuat...</div>
            <div id="tgl-hijriah" style="color: #FFD700; margin-top: 5px;"></div>
        </div>
    </div>

    <div class="sidebar" id="list-sholat"></div>

    <div class="running-text-fixed">
        <marquee scrollamount="3">Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.</marquee>
    </div>

    <div id="adzan-mode">
        <div id="persiapan-text"></div>
        <div id="countdown-text"></div>
        <div id="progress-wrapper" style="display:none;">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="battery-head"></div>
        </div>
    </div>

    <script>
        let jadwal = null;

        async function update() {
            const now = new Date();
            document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false 
            }).replace(/\./g, ':');

            if (jadwal) {
                let berikutnya = null;
                let modeAktif = false;
                const urutan = ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'];

                for (let w of urutan) {
                    const [h, m] = jadwal[w].split(':');
                    const tAdzan = new Date();
                    tAdzan.setHours(h, m, 0);
                    
                    const diff = (tAdzan - now) / 1000;

                    if (diff > -300 && diff <= 60) {
                        renderAdzanMode(diff);
                        modeAktif = true;
                        break;
                    }

                    if (now < tAdzan && !berikutnya) {
                        berikutnya = w;
                    }
                }

                if (!modeAktif) {
                    document.getElementById('adzan-mode').style.display = 'none';
                }

                document.querySelectorAll('.kotak-jadwal').forEach(el => el.classList.remove('aktif'));
                if (berikutnya) {
                    const elBerikutnya = document.getElementById('row-' + berikutnya);
                    if (elBerikutnya) {
                        elBerikutnya.classList.add('aktif');
                    }
                }
            }
        }

        function renderAdzanMode(diff) {
            const adzan = document.getElementById('adzan-mode');
            const pText = document.getElementById('persiapan-text');
            const cText = document.getElementById('countdown-text');
            const pWrap = document.getElementById('progress-wrapper');
            const pBar = document.getElementById('progress-bar');

            adzan.style.display = 'flex';

            if (diff > 0) {
                pText.innerText = "PERSIAPAN ADZAN";
                cText.innerText = Math.floor(diff);
                pWrap.style.display = 'none';
            } else {
                pText.innerText = "SAAT ADZAN HARAP TENANG";
                cText.innerText = "";
                pWrap.style.display = 'flex';
                
                const elapsed = Math.abs(diff);
                pBar.style.width = (elapsed / 240) * 100 + "%";
                pBar.style.backgroundColor = elapsed <= 80 ? '#FF0033' : elapsed <= 160 ? '#FFFF00' : '#CCFF00';
            }
        }

        async function init() {
            const now = new Date();
            document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });

            const resJ = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
            const dataJ = await resJ.json();
            const t = dataJ.data.timings;
            const h = dataJ.data.date.hijri;

            document.getElementById('tgl-hijriah').innerText = `${h.day} ${h.month.en} ${h.year} H`;

            jadwal = { 
                subuh: t.Fajr, 
                dzuhur: t.Dhuhr, 
                ashar: t.Asr, 
                maghrib: t.Maghrib, 
                isya: t.Isha 
            };

            const listSholat = document.getElementById('list-sholat');
            listSholat.innerHTML = Object.entries(jadwal).map(([k,v]) => `
                <div class="kotak-jadwal" id="row-${k}">
                    <span class="nama-sholat">${k.toUpperCase()}</span>
                    <span class="waktu-sholat">${v}</span>
                </div>
            `).join('');
        }

        init();
        setInterval(update, 1000);
    </script>
</body>
</html>
