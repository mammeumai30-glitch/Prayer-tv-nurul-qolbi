<script>
    let jadwal = null;
    let playedAdzan = false; 
    let playedIqomah = false;
    const audioBeep = new Audio('https://files.catbox.moe/q59d0u.mp3');
    function playAlert() { audioBeep.play().catch(e => console.log("Menunggu interaksi")); }

    async function update() {
        const now = new Date(); document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(/\./g, ':');
        if (jadwal) { 
            let nextFound = false;
            ['subuh', 'dzuhur', 'ashar', 'maghrib', 'isya'].forEach((waktu) => {
                const [h, m] = jadwal[waktu].split(':'); const tAdzan = new Date(); tAdzan.setHours(h, m, 0);
                const diff = (tAdzan - now) / 1000;
                renderAdzanMode(diff, waktu);
                const el = document.getElementById('jadwal-' + waktu);
                if (el && diff > 0 && !nextFound) { el.classList.add('active-sholat'); nextFound = true; } 
                else if (el) { el.classList.remove('active-sholat'); }
            });
        }
    }

    function renderAdzanMode(diff, waktu) {
        const adzan = document.getElementById('adzan-mode'), pText = document.getElementById('persiapan-text'), cText = document.getElementById('countdown-text'), pWrap = document.getElementById('progress-wrapper'), pBar = document.getElementById('progress-bar');
        
        // Momen Persiapan Adzan
        if (diff > 0 && diff <= 60) {
            // Reset status jika belum masuk 3 detik
            if (Math.floor(diff) > 3) playedAdzan = false; 
            
            if (Math.floor(diff) === 3 && !playedAdzan) { 
                playAlert(); 
                playedAdzan = true; 
            }
            adzan.style.display = 'flex'; pText.innerText = "PERSIAPAN ADZAN"; cText.innerText = Math.floor(diff); pWrap.style.display = 'none'; 
        } 
        // Momen Saat Adzan
        else if (diff <= 0 && diff >= -240) { 
            playedAdzan = false; // Reset agar siap untuk waktu sholat berikutnya
            adzan.style.display = 'flex'; pText.innerText = "SAAT ADZAN HARAP TENANG"; cText.innerText = ""; pWrap.style.display = 'flex'; const elapsed = Math.abs(diff); pBar.style.width = (elapsed / 240) * 100 + "%"; pBar.style.backgroundColor = elapsed <= 80 ? '#FF0033' : elapsed <= 160 ? '#FFFF00' : '#CCFF00'; 
        } 
        // Momen Iqomah
        else if (diff < -240) {
            const sisaIqomah = ((waktu === 'subuh') ? 600 : 360) - (Math.abs(diff) - 240);
            if (sisaIqomah > 0) { 
                if (Math.floor(sisaIqomah) > 3) playedIqomah = false;
                if (Math.floor(sisaIqomah) === 3 && !playedIqomah) { 
                    playAlert(); 
                    playedIqomah = true; 
                }
                adzan.style.display = 'flex'; pText.innerHTML = '<div id="iqomah-text">IQOMAH</div><div id="iqomah-timer">' + Math.floor(sisaIqomah/60).toString().padStart(2,'0') + ':' + Math.floor(sisaIqomah%60).toString().padStart(2,'0') + '</div>'; cText.innerText = ""; pWrap.style.display = 'none'; 
            } else if (sisaIqomah <= 0 && sisaIqomah > -600) { 
                playedIqomah = false;
                adzan.style.display = 'flex'; pText.innerHTML = '<div id="sholat-text">WAKTU SHOLAT</div><div id="jam-sholat">' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(/\./g, ':') + '</div>'; 
            } else { adzan.style.display = 'none'; }
        }
    }
    // ... sisa fungsi init() tetap sama ...
    async function init() {
        const now = new Date(); document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        const resJ = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
        const dataJ = await resJ.json(); const t = dataJ.data.timings; const h = dataJ.data.date.hijri; document.getElementById('tgl-hijriah').innerText = `${h.day} ${h.month.en} ${h.year} H`;
        jadwal = { imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha };
        document.getElementById('list-sholat').innerHTML = Object.entries(jadwal).map(([k,v]) => `<div class="kotak-jadwal" id="jadwal-${k}"><span class="nama-sholat">${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
    }
    init(); setInterval(update, 1000);
</script>
