<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; 
               grid-template-columns: 280px 1fr; grid-template-rows: 120px 1fr; overflow: hidden; }

        .header { grid-area: 1 / 1 / 2 / 3; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .sidebar { grid-area: 2 / 1 / 3 / 2; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* KOTAK JADWAL - Warna Default */
        .kotak-jadwal { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 6px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.3rem; 
        }
        
        /* FORCE COLOR DEFAULT (EMAS) */
        .nama-sholat, .kotak-jadwal span { color: #FFD700 !important; font-weight: bold; }

        /* KONDISI AKTIF (HIJAU STABILO) */
        .active-sholat { background: #32CD32 !important; }
        
        /* FORCE COLOR HITAM SAAT AKTIF (Paling Prioritas) */
        .active-sholat, 
        .active-sholat .nama-sholat, 
        .active-sholat span { 
            color: #000 !important; 
        }
    </style>
</head>
<body>
    <div class="header">
        <div id="jam" style="font-size: 2.5rem; font-family: monospace;">00:00:00</div>
        <div style="text-align:center;">
            <h1>MASJID JAMI' NURUL QOLBI</h1>
        </div>
    </div>
    <div class="sidebar" id="list-sholat"></div>

    <script>
        let jadwal = null;
        async function updateData() {
            const now = new Date();
            document.getElementById('jam').innerText = now.toTimeString().split(' ')[0];
            if (!jadwal) return;
            
            const sholatKeys = ['imsak', 'subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            let lastPassedIndex = -1;
            sholatKeys.forEach((key, index) => {
                const [h, m] = jadwal[key].split(':');
                const t = new Date(); t.setHours(h, m, 0);
                if (now >= t) lastPassedIndex = index;
            });
            let activeIndex = (lastPassedIndex >= 6) ? 1 : lastPassedIndex;
            document.querySelectorAll('.kotak-jadwal').forEach((el, idx) => {
                el.classList.toggle('active-sholat', idx === activeIndex);
            });
        }

        async function init() {
            const now = new Date();
            const res = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
            const data = await res.json();
            const t = data.data.timings;
            jadwal = { imsak: t.Imsak, subuh: t.Fajr, terbit: t.Sunrise, dzuhur: t.Dhuhr, ashar: t.Asr, maghrib: t.Maghrib, isya: t.Isha };
            document.getElementById('list-sholat').innerHTML = Object.entries(jadwal).map(([k,v]) => 
                `<div class="kotak-jadwal"><span class="nama-sholat">${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
        }
        init(); setInterval(updateData, 1000);
    </script>
</body>
</html>
