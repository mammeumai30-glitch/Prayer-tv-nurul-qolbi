<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; }
        #bg-video { position: fixed; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

        /* Sisi Kiri (Vertical) */
        #sidebar { width: 350px; background: rgba(0,0,0,0.85); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .j-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; }

        /* Sisi Kanan (Main Area) */
        #main-area { flex-grow: 1; padding: 30px; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: start; }
        #jam-utama { font-size: 5rem; font-weight: bold; }
        .masjid-section { text-align: center; }
        .tgl-section { text-align: right; }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="LINK_VIDEO_ANDA_DI_SINI.mp4" type="video/mp4">
</video>

<div id="sidebar">
    <div id="list-sholat"></div>
</div>

<div id="main-area">
    <div id="jam-utama">00:00:00</div>
    <div class="masjid-section">
        <h1 style="margin:0; font-size: 1.8rem; color: #FFD700;">MASJID JAMI' NURUL QOLBI</h1>
        <div style="font-size: 1rem;">Perum Dian Anyar, Purwakarta</div>
    </div>
    <div class="tgl-section">
        <div id="tgl-masehi"></div>
        <div id="tgl-hijriah" style="color: #FFD700;"></div>
    </div>
</div>

<script>
    async function updateApp() {
        const now = new Date();
        document.getElementById('jam-utama').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const resHijri = await fetch('https://api.aladhan.com/v1/gToH?date=' + now.getDate() + '-' + (now.getMonth()+1) + '-' + now.getFullYear());
        const dataHijri = await resHijri.json();
        document.getElementById('tgl-hijriah').innerText = dataHijri.data.hijri.date + " " + dataHijri.data.hijri.month.en;

        const resSholat = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate());
        const dataSholat = await resSholat.json();
        const j = dataSholat.data.jadwal;
        
        document.getElementById('list-sholat').innerHTML = `
            <div class="j-card"><span>Subuh</span><span>${j.subuh}</span></div>
            <div class="j-card"><span>Syuruq</span><span>${j.terbit}</span></div>
            <div class="j-card"><span>Dzuhur</span><span>${j.dzuhur}</span></div>
            <div class="j-card"><span>Ashar</span><span>${j.ashar}</span></div>
            <div class="j-card"><span>Maghrib</span><span>${j.maghrib}</span></div>
            <div class="j-card"><span>Isya</span><span>${j.isya}</span></div>
        `;
    }
    setInterval(updateApp, 1000);
    updateApp();
</script>
</body>
</html>
