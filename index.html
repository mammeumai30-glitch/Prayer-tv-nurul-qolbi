<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; 
               display: grid; 
               grid-template-columns: 280px 1fr; 
               grid-template-rows: 120px 1fr 60px; 
               grid-template-areas: "header header" "sidebar content" "footer footer"; }

        /* Header dikunci 120px */
        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid #333; }
        
        /* Sidebar dikunci 280px */
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Footer running teks dikunci 60px */
        .footer { grid-area: footer; background: #FFD700; color: #000; display: flex; align-items: center; overflow: hidden; font-size: 1.5rem; font-weight: bold; }

        /* Komponen pendukung */
        #jam { width: 200px; font-size: 2.2rem; font-weight: bold; }
        .masjid-box { flex: 1; text-align: center; }
        .masjid-box h1 { margin: 0; font-size: 2.2rem; color: #FFD700; }
        .kotak-jadwal { background: #1a1a1a; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div class="header">
        <div id="jam">00:00</div>
        <div class="masjid-box"><h1>MASJID JAMI' NURUL QOLBI</h1></div>
        <div style="width: 250px; text-align: right;">19 Juni 2026</div>
    </div>
    <div class="sidebar" id="list-sholat"></div>
    <div class="footer">
        <marquee scrollamount="4">Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.</marquee>
    </div>

    <script>
        // Script update sama seperti sebelumnya
        async function update() {
            const j = {imsak:'04:09', subuh:'04:19', terbit:'05:37', dzuhur:'11:35', ashar:'14:54', maghrib:'17:25', isya:'18:39'};
            document.getElementById('list-sholat').innerHTML = Object.entries(j).map(([k,v]) => `<div class="kotak-jadwal"><span style="color:#FFD700">${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
        }
        update();
    </script>
</body>
</html>
