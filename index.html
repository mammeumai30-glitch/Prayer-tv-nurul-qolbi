<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Prayer TV - Nurul Qolbi</title>
<style>
@font-face {
  font-family: 'MontserratLocal';
  src: url('Montserrat-SemiBold.ttf') format('truetype');
  font-weight: 600;
  font-style: normal;
}
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: sans-serif;
  height: 100vh;
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 120px 1fr;
  grid-template-areas: "header header" "sidebar content";
  overflow: hidden;
}
.header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}
#jam {
  width: 250px;
  font-size: 2.5rem;
  font-weight: bold;
  font-family: monospace;
}
.masjid-box {
  flex: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.masjid-box h1 {
  margin: 0;
  font-size: 2.6rem;
  color: #FFD700;
  font-family: 'Times New Roman', serif;
}
.alamat {font-size:1.3rem;margin-top:2px;}
.tgl-box {width:250px;text-align:right;font-size:1.2rem;}
.sidebar {grid-area:sidebar;padding:15px;display:flex;flex-direction:column;gap:8px;}
.kotak-jadwal {
  background:#1a1a1a;padding:15px;border-radius:6px;
  display:flex;justify-content:space-between;font-size:1.3rem;color:#fff;transition:background .3s;
}
.active-sholat {background:#32CD32!important;}
.active-sholat * {color:#000!important;font-weight:bold!important;}
.nama-sholat {color:#FFD700;font-weight:bold;}
.active-sholat .nama-sholat {color:#000!important;}
.running-text-fixed {
  position:fixed;bottom:0;left:0;width:100%;height:50px;
  background:#FFD700;color:#000;font-size:1.5rem;font-weight:bold;
  display:flex;align-items:center;z-index:9999;
}
#adzan-mode {
  position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;
  display:none;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;z-index:999999;
}
/* gambar background */
#bg-adzan-img {
   position:absolute;top:0;left:0;width:100%;height:100%;
   object-fit:cover;object-position:center;z-index:-1;
}

/* teks utama dan timer */
#persiapan-text {
  font-family:'MontserratLocal',sans-serif;
  font-size:5rem;color:#F5F1E8;margin-bottom:20px;text-transform:uppercase;font-weight:600;
}
#countdown-text {
  font-family:'MontserratLocal',sans-serif;
  font-size:15rem;color:#E8D27A;font-weight:600;line-height:1;
}
#iqomah-text {
  font-family:'MontserratLocal',sans-serif;
  font-size:5rem;color:#F5F1E8;margin-bottom:20px;text-transform:uppercase;font-weight:600;
}
#iqomah-timer {
  font-family:'MontserratLocal',sans-serif;
  font-size:15rem;color:#E8D27A;font-weight:600;line-height:1;
}
#sholat-text {
  font-family:'MontserratLocal',sans-serif;
  font-size:5rem;color:#F5F1E8;margin-bottom:20px;text-transform:uppercase;font-weight:600;
}
#jam-sholat {
  font-family:'MontserratLocal',sans-serif;
  font-size:15rem;color:#E8D27A;font-weight:600;line-height:1;
}

/* progress bar */
#progress-wrapper {display:flex;align-items:center;justify-content:center;width:100%;margin-top:20px;z-index:1000;}
#progress-container {width:500px;height:60px;background:#333;border:4px solid #fff;border-radius:12px;overflow:hidden;position:relative;}
#progress-bar {height:100%;width:0%;transition:width 1s linear,background-color .5s ease;position:absolute;left:0;top:0;}
#battery-head {width:20px;height:30px;background:#fff;border-radius:0 6px 6px 0;margin-left:2px;}

/* Animasi tambahan */
.fade-in-anim {animation:fadeInAdzan 3s ease forwards;}
.fade-out-anim {animation:fadeOutAdzan 3s ease forwards;}
.slow-zoom {animation:slowZoom 60s ease-out forwards;transform-origin:center center;}
@keyframes fadeInAdzan {from{opacity:0;}to{opacity:1;}}
@keyframes fadeOutAdzan {from{opacity:1;}to{opacity:0;}}
@keyframes slowZoom {from{transform:scale(1);}to{transform:scale(1.08);}}
</style>
</head>
<body>
<button onclick="playAlert()" style="position:fixed;bottom:10px;left:10px;z-index:99999;background:transparent;border:none;color:#FFD700;font-size:1.5rem;cursor:pointer;font-weight:bold;">🔊</button>

<div class="header">
  <div id="jam">00:00:00</div>
  <div class="masjid-box"><h1>MASJID JAMI' NURUL QOLBI</h1><div class="alamat">Perumahan Dian Anyar, Purwakarta 41118</div></div>
  <div class="tgl-box">
    <div id="tgl-masehi">Memuat...</div>
    <div id="tgl-hijriah" style="color:#FFD700;margin-top:5px;"></div>
  </div>
</div>

<div class="sidebar" id="list-sholat"></div>

<div class="running-text-fixed">
<marquee id="running-text-marquee" scrollamount="3">
Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.
</marquee>
</div>

<div id="adzan-mode">
  <img id="bg-adzan-img" src="" alt="Background">
  <div id="persiapan-text"></div>
  <div id="countdown-text"></div>
  <div id="progress-wrapper" style="display:none;">
    <div id="progress-container"><div id="progress-bar"></div></div><div id="battery-head"></div>
  </div>
</div>

<script>
let jadwal=null, config={}, playedAdzan=false, playedIqomah=false;
let currentAdzanMode="", fadeOutIqomahStarted=false;

const audioBeep=new Audio('https://github.com/mammeumai30-glitch/Prayer-tv-nurul-qolbi/raw/main/soft%20alert.mp3');
function playAlert(){audioBeep.play().catch(e=>console.log("Menunggu interaksi"));}

/*--- load Sheet konfigurasi ---*/
async function loadSheet3(){
 try{
   const res=await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRly2lYE664Weh76yXLbQrFd_EjXS1csosjHS21QK5yhPeuRcfK-QGngcIjrZOWp9N-rnsE_bFymAeq/pub?gid=1745632409&single=true&output=csv');
   const data=await res.text();const rows=data.split('\n');
   if(rows.length>1){
     const cols=rows[1].split(',');
     config={namaMasjid:cols[0]?.trim(),alamat:cols[1]?.trim(),
       vid1:cols[2]?.trim(),vid2:cols[3]?.trim(),vid3:cols[4]?.trim(),durasiVid:parseInt(cols[5]),
       linkAlert:cols[6]?.trim(),info:cols[7]?.trim(),runningText:cols[8]?.trim(),
       bgPersiapan:cols[9]?.trim(),durasiPersiapan:parseInt(cols[10]),
       bgAdzan:cols[11]?.trim(),durasiAdzan:parseInt(cols[12]),
       bgIqomah:cols[13]?.trim(),durasiIqomah:parseInt(cols[14]),
       bgSholat:cols[15]?.trim(),durasiSholat:parseInt(cols[16])};
   }
 }catch(e){console.error("Gagal load Sheet3",e);}
}

/*--- load jadwal sholat ---*/
async function loadJadwalFromSheet(){
 try{
   const res=await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vRly2lYE664Weh76yXLbQrFd_EjXS1csosjHS21QK5yhPeuRcfK-QGngcIjrZOWp9N-rnsE_bFymAeq/pub?gid=761413076&single=true&output=csv');
   const data=await res.text();const rows=data.split('\n');
   rows.forEach(row=>{
     if(row.includes('Hasil Akhir')){
       const cols=row.split(',');
       jadwal={imsak:cols[3].trim(),subuh:cols[4].trim(),terbit:cols[5].trim(),dzuhur:cols[6].trim(),ashar:cols[7].trim(),maghrib:cols[8].trim(),isya:cols[9].trim()};
     }
   });
   if(jadwal){
     document.getElementById('list-sholat').innerHTML=Object.entries(jadwal).map(([k,v])=>
       `<div class="kotak-jadwal" id="jadwal-${k}"><span class="nama-sholat">${k.toUpperCase()}</span><span>${v}</span></div>`).join('');
   }
 }catch(e){console.error("Gagal load Sheet2",e);}
}

/*--- update utama ---*/
async function update(){
 const now=new Date();document.getElementById('jam').innerText=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).replace(/\./g,':');
 if(!jadwal)return;
 let nextSholat=null;
 const urutanSholat=['subuh','dzuhur','ashar','maghrib','isya'];
 for(let waktu of urutanSholat){
  const[h,m]=jadwal[waktu].split(':');const tJ=new Date();tJ.setHours(parseInt(h),parseInt(m),0);
  if(tJ>now){nextSholat=waktu;break;}
 }
 if(!nextSholat)nextSholat='subuh';
 ['imsak','subuh','terbit','dzuhur','ashar','maghrib','isya'].forEach(w=>{
   const el=document.getElementById('jadwal-'+w);
   if(el)w===nextSholat?el.classList.add('active-sholat'):el.classList.remove('active-sholat');
 });

 let activeWaktu=null;
 function validDurasi(n,f){return Number.isFinite(n)&&n>0?n:f;}
 urutanSholat.forEach(w=>{
   const[h,m]=jadwal[w].split(':');const tA=new Date();tA.setHours(parseInt(h),parseInt(m),0);
   const diff=(tA-now)/1000;
   const dP=validDurasi(config.durasiPersiapan,60),dA=validDurasi(config.durasiAdzan,240),
         dI=validDurasi(config.durasiIqomah,w==='subuh'?600:360),dS=validDurasi(config.durasiSholat,600);
   const total=dA+dI+dS;
   if(diff>=-total&&diff<=dP)activeWaktu={waktu:w,diff:diff};
 });

 if(activeWaktu)renderAdzanMode(activeWaktu.diff,activeWaktu.waktu);
 else{
   const adzan=document.getElementById('adzan-mode'),bg=document.getElementById('bg-adzan-img');
   adzan.style.display='none';adzan.classList.remove('fade-in-anim','fade-out-anim');bg.classList.remove('slow-zoom');
   currentAdzanMode="";fadeOutIqomahStarted=false;playedAdzan=false;playedIqomah=false;
 }
}

/*--- render mode adzan ---*/
function renderAdzanMode(diff,waktu){
 const adzan=document.getElementById('adzan-mode'),
  pText=document.getElementById('persiapan-text'),
  cText=document.getElementById('countdown-text'),
  pWrap=document.getElementById('progress-wrapper'),
  pBar=document.getElementById('progress-bar'),
  bg=document.getElementById('bg-adzan-img');
 function vDurasi(v,f){return Number.isFinite(v)&&v>0?v:f;}
 const dP=vDurasi(config.durasiPersiapan,60),
       dA=vDurasi(config.durasiAdzan,240),
       dI=vDurasi(config.durasiIqomah,waktu==='subuh'?600:360),
       dS=vDurasi(config.durasiSholat,600);

 // helper animasi tampil
 function tampil(mode,bgSrc,dZoom){
   if(currentAdzanMode!==mode||adzan.style.display==='none'){
     adzan.classList.remove('fade-in-anim','fade-out-anim');bg.classList.remove('slow-zoom');
     void adzan.offsetWidth;void bg.offsetWidth;
     bg.src=bgSrc||"";bg.style.setProperty('--zoom-duration',dZoom+'s');
     adzan.style.display='flex';adzan.classList.add('fade-in-anim');bg.classList.add('slow-zoom');
     currentAdzanMode=mode;fadeOutIqomahStarted=false;
   }
 }

 // Persiapan adzan
 if(diff>0&&diff<=dP){
   tampil('persiapan',config.bgPersiapan,dP);
   if(Math.floor(diff)>=3&&Math.floor(diff)<4&&!playedAdzan){playAlert();playedAdzan=true;}
   pText.innerText="PERSIAPAN ADZAN";pText.style.color="#F5F1E8";
   cText.innerText=Math.floor(diff);cText.style.color="#E8D27A";
   pWrap.style.display='none';
 }

 // Saat adzan
 else if(diff<=0&&diff>=-dA){
   tampil('adzan',config.bgAdzan,dA);playedAdzan=false;
   pText.innerText="SAAT ADZAN HARAP TENANG";pText.style.color="#F5F1E8";
   cText.innerText="";pWrap.style.display='flex';
   const elapsed=Math.abs(diff);const percent=Math.min((elapsed/dA)*100,100);
   pBar.style.width=percent+"%";
   pBar.style.backgroundColor=elapsed<=dA/3?'#FF0033':elapsed<=(dA/3)*2?'#FFFF00':'#00C853';
 }

 // Iqomah
 else if(diff<-dA){
   const sI=dI-(Math.abs(diff)-dA);
   if(sI>0){
     tampil('iqomah',config.bgIqomah,dI);
     if(Math.floor(sI)>=3&&Math.floor(sI)<4&&!playedIqomah){playAlert();playedIqomah=true;}
     pText.innerHTML='<div id="iqomah-text" style="color:#F5F1E8;">IQOMAH</div><div id="iqomah-timer" style="color:#E8D27A;">'+
      Math.floor(sI/60).toString().padStart(2,'0')+':'+Math.floor(sI%60).toString().padStart(2,'0')+'</div>';
     cText.innerText="";pWrap.style.display='none';
     if(sI<=3&&!fadeOutIqomahStarted){adzan.classList.remove('fade-in-anim');void adzan.offsetWidth;adzan.classList.add('fade-out-anim');fadeOutIqomahStarted=true;}
   }
   else if(sI<=0&&sI>-dS){
     tampil('sholat',config.bgSholat,dS);playedIqomah=false;
     pText.innerHTML='<div id="sholat-text" style="color:#F5F1E8;">WAKTU SHOLAT</div><div id="jam-sholat" style="color:#E8D27A;">'+
       new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).replace(/\./g,':')+'</div>';
     cText.innerText="";pWrap.style.display='none';
   }else{
     adzan.style.display='none';adzan.classList.remove('fade-in-anim','fade-out-anim');bg.classList.remove('slow-zoom');
     currentAdzanMode="";fadeOutIqomahStarted=false;
   }
 }
}

/*--- init ---*/
async function init(){
 const now=new Date();
 document.getElementById('tgl-masehi').innerText=now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
 await loadJadwalFromSheet();await loadSheet3();
 if(config.namaMasjid)document.querySelector('.masjid-box h1').innerText=config.namaMasjid;
 if(config.alamat)document.querySelector('.alamat').innerText=config.alamat;
 if(config.runningText)document.getElementById('running-text-marquee').innerText=config.runningText;
 try{
   const res=await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
   const data=await res.json();const h=data.data.date.hijri;
   document.getElementById('tgl-hijriah').innerText=`${h.day} ${h.month.en} ${h.year} H`;
 }catch(e){}
}
init();
setInterval(update,1000);
</script>
</body>
</html>
