<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial; overflow: hidden; height: 100vh; }
        
        /* Layout Utama */
        .grid-layout { display: flex; height: 100vh; }
        
        /* Jadwal Kiri */
        .sidebar { width: 300px; background: #111; padding: 20px; }
        .item { padding: 15px; border-bottom: 1px solid #333; font-size: 1.5rem; font-weight: bold; display: flex; justify-content: space-between; }
        
        /* Area Kanan */
        .main { flex: 1; padding: 30px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: start; }
        #jam-utama { font-size: 6rem; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="grid-layout">
    <div class="sidebar" id="list-sholat">Memuat...</div>
    
    <div class="main">
        <div class="header">
            <div id="jam-utama">00:00:00</div>
            <div style="text-align: right;">
                <h1 style="margin:0; font-size: 1.5rem; color: #FFD700;">MASJID JAMI' NURUL QOLBI</h1>
                <div id="tgl-masehi"></div>
                <div id="tgl-hijriah" style="color: #FFD700;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    async function update() {
        const now = new Date();
        document.getElementById('jam-utama').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        
        // Tanggal
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        const resH = await fetch('https://api.aladhan.com/v1/gToH?date=' + now.getDate() + '-' + (now.getMonth()+1) + '-' + now.getFullYear());
        const dataH = await resH.json();
        document.getElementById('tgl-hijriah').innerText = dataH.data.hijri.date + " " + dataH.data.hijri.month.en;

        const resJ = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate());
        const dataJ = await resJ.json();
        const j = dataJ.data.jadwal;
        
        document.getElementById('list-sholat').innerHTML = `
            <div class="item"><span>Subuh</span><span>${j.subuh}</span></div>
            <div class="item"><span>Syuruq</span><span>${j.terbit}</span></div>
            <div class="item"><span>Dzuhur</span><span>${j.dzuhur}</span></div>
            <div class="item"><span>Ashar</span><span>${j.ashar}</span></div>
            <div class="item"><span>Maghrib</span><span>${j.maghrib}</span></div>
            <div class="item"><span>Isya</span><span>${j.isya}</span></div>
        `;
    }
    setInterval(update, 1000);
    update();
</script>
</body>
</html>
