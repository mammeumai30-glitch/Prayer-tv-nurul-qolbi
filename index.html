<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; 
               grid-template-columns: 280px 1fr; 
               grid-template-rows: 100px 1fr; 
               grid-template-areas: "header header" "sidebar content";
               overflow: hidden; }

        /* Header Bar */
        .header { grid-area: header; display: grid; grid-template-columns: 180px 1fr 280px; align-items: center; padding: 0 20px; border-bottom: 2px solid #333; }
        
        /* Jam (Diperkecil) */
        #jam { font-size: 2.5rem; font-weight: bold; text-align: left; }
        
        /* Nama Masjid (Diperbesar & ada Alamat) */
        .masjid-box { text-align: center; }
        .masjid-box h1 { margin: 0; font-size: 2rem; color: #FFD700; }
        .alamat { font-size: 1.1rem; color: #ccc; }

        /* Tanggal (Diperlebar) */
        .tgl-box { text-align: right; font-size: 1.1rem; }

        /* Sidebar (Jadwal) */
        .sidebar { grid-area: sidebar; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 1.2rem; }
        .nama-sholat { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div id="jam">00:00:00</div>
    <div class="masjid-box">
        <h1>MASJID JAMI' NURUL QOLBI</h1>
        <div class="alamat">Perum Dian Anyar, Purwakarta</div>
    </div>
    <div class="tgl-box">
        <div id="tgl-masehi">Memuat...</div>
        <div id="tgl-hijriah" style="color: #FFD700; margin-top: 5px;"></div>
    </div>
</div>

<div class="sidebar" id="list-sholat"></div>

<script>
    async function update() {
        const now = new Date();
        document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const resH = await fetch('https://api.aladhan.com/v1/gToH?date=' + now.getDate() + '-' + (now.getMonth()+1) + '-' + now.getFullYear());
        const dataH = await resH.json();
        document.getElementById('tgl-hijriah').innerText = dataH.data.hijri.date + " " + dataH.data.hijri.month.en;

        const resJ = await fetch('https://api.myquran.com/v2/sholat/jadwal/1615/' + now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate());
        const dataJ = await resJ.json();
        const j = dataJ.data.jadwal;
        
        document.getElementById('list-sholat').innerHTML = `
            <div class="kotak-jadwal"><span class="nama-sholat">Imsak</span><span>${j.imsak}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Subuh</span><span>${j.subuh}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Syuruq</span><span>${j.terbit}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Dzuhur</span><span>${j.dzuhur}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Ashar</span><span>${j.ashar}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Maghrib</span><span>${j.maghrib}</span></div>
            <div class="kotak-jadwal"><span class="nama-sholat">Isya</span><span>${j.isya}</span></div>
        `;
    }
    setInterval(update, 1000);
    update();
</script>
</body>
</html>
