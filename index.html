<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        :root { --gold: #FFD700; }
        body { margin: 0; font-family: 'Arial', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* Video Background */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

        /* Header */
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.5); }
        h1 { margin: 0; color: var(--gold); font-size: 2rem; }
        .lokasi { font-size: 1.2rem; color: #fff; }

        /* Info Pojok Kanan */
        #top-right { position: absolute; top: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }

        /* Main View */
        #main-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; }
        #status-sholat { font-size: 2.5rem; color: var(--gold); margin-bottom: 10px; }
        #timer-display { font-size: 10rem; font-weight: bold; }

        #marquee { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 15px; font-size: 1.5rem; color: var(--gold); }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="LINK_VIDEO_ANDA_DI_SINI.mp4" type="video/mp4">
</video>

<header>
    <h1>MASJID JAMI' NURUL QOLBI</h1>
    <div class="lokasi">Perum Dian Anyar, Purwakarta</div>
</header>

<div id="top-right">
    <div id="tanggal-masehi"></div>
    <div id="tanggal-hijriah"></div>
    <div id="cuaca">Cuaca: Mendung - 28°C</div>
</div>

<div id="main-view">
    <div id="status-sholat">Waktu Sekarang</div>
    <div id="timer-display">00:00:00</div>
</div>

<div id="marquee">
    <marquee scrollamount="6">Selamat Datang di Masjid Jami' Nurul Qolbi | Mari makmurkan masjid dengan sholat berjamaah</marquee>
</div>

<script>
    // Update Jam & Logika Status
    function updateApp() {
        const now = new Date();
        document.getElementById('timer-display').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        
        // Contoh Logika: Jika menit ke 40-59 (misal mendekati subuh)
        const minute = now.getMinutes();
        if (minute >= 40 && minute <= 59) {
            document.getElementById('status-sholat').innerText = "Persiapan Adzan";
        } else {
            document.getElementById('status-sholat').innerText = "Waktu Sekarang";
        }

        // Tanggal
        document.getElementById('tanggal-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    setInterval(updateApp, 1000);
    updateApp();
</script>
</body>
</html>
