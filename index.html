<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prayer TV - Nurul Qolbi</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 120px 1fr; grid-template-areas: "header header" "sidebar content"; overflow: hidden; }
        .header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        #jam { width: 250px; font-size: 2.5rem; font-weight: bold; font-family: monospace; }
        .masjid-box { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .masjid-box h1 { margin: 0; font-size: 2.6rem; color: #FFD700; font-family: 'Times New Roman', serif; }
        .alamat { font-size: 1.3rem; margin-top: 2px; }
        .tgl-box { width: 250px; text-align: right; font-size: 1.2rem; }
        .sidebar { grid-area: sidebar; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .kotak-jadwal { background: #1a1a1a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 1.3rem; color: #fff; transition: background 0.3s; }
        .active-sholat { background: #32CD32 !important; }
        .active-sholat * { color: #000 !important; font-weight: bold !important; }
        .nama-sholat { color: #FFD700; font-weight: bold; }
        .active-sholat .nama-sholat { color: #000 !important; }
        .running-text-fixed { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #FFD700; color: #000; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; z-index: 9999; }
        #adzan-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 999999; }
    </style>
</head>
<body>
<div class="header">
    <div id="jam">00:00:00</div>
    <div class="masjid-box"><h1>MASJID JAMI' NURUL QOLBI</h1><div class="alamat">Perumahan Dian Anyar, Purwakarta 41118</div></div>
    <div class="tgl-box"><div id="tgl-masehi">Memuat...</div><div id="tgl-hijriah" style="color: #FFD700; margin-top: 5px;"></div></div>
</div>
<div class="sidebar" id="list-sholat"></div>
<div class="running-text-fixed"><marquee scrollamount="3">Selamat datang di Masjid Jami' Nurul Qolbi. Mari makmurkan masjid dengan sholat berjamaah tepat waktu.</marquee></div>
<div id="adzan-mode"></div>

<script>
    let jadwal = null;

    async function init() {
        const now = new Date(); 
        document.getElementById('tgl-masehi').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        
        // Link CSV diperbaiki dengan gid=761413076 untuk membaca Sheet2
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRly2lYE664Weh76yXLbQrFd_EjXS1csosjHS21QK5yhPeuRcfK-QGngcIjrZOWp9N-rnsE_bFymAeq/pub?gid=761413076&single=true&output=csv';
        
        try {
            const res = await fetch(csvUrl);
            const data = await res.text();
            const rows = data.split('\n');
            // Baris ke-4 (indeks 3) berisi data "Hasil Akhir"
            const hasilAkhir = rows[3].split(','); 
            
            jadwal = {
                imsak: hasilAkhir[1].trim(),
                subuh: hasilAkhir[2].trim(),
                terbit: hasilAkhir[3].trim(),
                dzuhur: hasilAkhir[4].trim(),
                ashar: hasilAkhir[5].trim(),
                maghrib: hasilAkhir[6].trim(),
                isya: hasilAkhir[7].trim()
            };

            const urutan = ['imsak', 'subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
            document.getElementById('list-sholat').innerHTML = urutan.map(k => 
                `<div class="kotak-jadwal" id="jadwal-${k}"><span class="nama-sholat">${k.toUpperCase()}</span><span>${jadwal[k]}</span></div>`
            ).join('');
            
            const resH = await fetch(`https://api.aladhan.com/v1/timings/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}?latitude=-6.5594&longitude=107.4478&method=11`);
            const dataH = await resH.json();
            const h = dataH.data.date.hijri;
            document.getElementById('tgl-hijriah').innerText = `${h.day} ${h.month.en} ${h.year} H`;
        } catch (e) { console.error("Error loading data:", e); }
    }

    function update() {
        const now = new Date(); 
        document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        
        if (!jadwal) return;

        let activeWaktu = null;
        const urutan = ['imsak', 'subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
        
        for (let i = 0; i < urutan.length; i++) {
            const waktu = urutan[i];
            const [h, m] = jadwal[waktu].split(':');
            const tJadwal = new Date(); tJadwal.setHours(parseInt(h), parseInt(m), 0);
            
            if (now >= tJadwal) {
                activeWaktu = waktu;
            }
        }

        document.querySelectorAll('.kotak-jadwal').forEach(el => el.classList.remove('active-sholat'));
        if (activeWaktu) {
            const el = document.getElementById('jadwal-' + activeWaktu);
            if (el) el.classList.add('active-sholat');
        }
    }

    init(); 
    setInterval(update, 1000); 
    setInterval(init, 3600000);
</script>
</body>
</html>
